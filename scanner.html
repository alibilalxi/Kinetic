<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>كاميرا المنسق </title>
    <link href="https://fonts.googleapis.com/css2?family=Amiri:wght@400;700&family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f2027; color: white; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; background: rgba(255,255,255,0.05); padding: 20px; border-radius: 15px; border: 1px solid rgba(255,255,255,0.1); }
        h2 { color: #fff; font-family: 'Amiri', serif; margin-bottom: 20px; }
        
        #reader { width: 100%; border-radius: 10px; overflow: hidden; border: 4px solid #1e3c72; background: #000; box-shadow: 0 10px 20px rgba(0,0,0,0.5); display: none; margin-bottom: 20px; }
        
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; animation: fadeIn 0.3s; cursor: pointer; }
        .success { background: #d4edda; color: #155724; border: 2px solid #c3e6cb; }
        .error { background: #f8d7da; color: #721c24; border: 2px solid #f5c6cb; }
        
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: #fff; border-radius: 8px; overflow: hidden; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        th, td { padding: 12px; border: 1px solid #ddd; text-align: right; }
        th { background: #1e3c72; color: #fff; width: 30%; font-weight: bold; }
        td { font-weight: bold; color: #333; }
        
        .action-btn { margin-top: 20px; padding: 15px 25px; font-size: 20px; border-radius: 8px; cursor: pointer; background: #28a745; color: white; border: none; font-weight: bold; font-family: 'Tajawal', sans-serif; width: 100%; box-shadow: 0 5px 15px rgba(0,0,0,0.3); transition: 0.3s;}
        .action-btn:active { transform: scale(0.95); }
        
        .loading { display: none; margin-top: 15px; font-size: 18px; font-weight: bold; color: #ffc107; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>
    <div class="container">
        <h2>QR Code</h2>
        
        <button id="startBtn" class="action-btn" onclick="startCamera()">فتح الكاميرا وبدء الفحص</button>
        
        <div id="reader"></div>
        <div id="loading" class="loading">⏳ جاري فحص السيرفر...</div>
        
        <div id="result" class="result-box" onclick="startCamera()"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <script>
        // ✅ اللينك الجديد بتاعك محطوط هنا بالظبط
        const GOOGLE_SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwZqKNrWJyMSbtyP9NIpH40bFtqZem8AaGWmSblunkhgXMf4U-ZAswRGbY-WJQlWH5lCA/exec';
        let html5QrCode;

        function startCamera() {
            document.getElementById('startBtn').style.display = 'none';
            document.getElementById('result').style.display = 'none';
            document.getElementById('reader').style.display = 'block';

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            html5QrCode.start(
                { facingMode: "environment" }, 
                { fps: 30, qrbox: { width: 250, height: 250 }, formatsToSupport: [ Html5QrcodeSupportedFormats.QR_CODE ] },
                (decodedText) => {
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        document.getElementById('loading').style.display = 'block';
                        
                        fetch(`${GOOGLE_SCRIPT_URL}?action=scan&barcode=${decodedText}`, {
                            method: 'GET',
                            redirect: 'follow'
                        })
                        .then(res => res.json())
                        .then(data => showResult(data))
                        .catch(err => {
                            console.error(err);
                            showError();
                        });
                    });
                }
            ).catch(err => {
                alert("لم يتم العثور على كاميرا أو لم تقم بإعطاء الصلاحية!");
                document.getElementById('startBtn').style.display = 'block';
            });
        }

        function showResult(data) {
            document.getElementById('loading').style.display = 'none';
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if(data.status === 'success') {
                resultDiv.className = 'result-box success';
                resultDiv.innerHTML = `
                    <h3 style="margin:0 0 10px 0;">✅ تم تأكيد الدفع</h3>
                    <table>
                        <tr><th>الاسم</th><td>${data.name}</td></tr>
                        <tr><th>الباقة</th><td>${data.choice}</td></tr>
                        <tr><th>السعر</th><td style="color:#d9534f;">EGP ${data.price}</td></tr>
                    </table>
                    <p style="margin-top:15px; font-size:14px;">(اضغط هنا لمسح تذكرة أخرى)</p>`;
            } else if(data.status === 'already_paid') {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `
                    <h3 style="margin:0 0 10px 0;">❌ تحذير: التذكرة مستخدمة!</h3>
                    <table>
                        <tr><th>الاسم</th><td>${data.name}</td></tr>
                        <tr><th>الباقة</th><td>${data.choice}</td></tr>
                    </table>
                    <p style="margin-top:15px; font-size:14px;">(اضغط هنا لمسح تذكرة أخرى)</p>`;
            } else {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `<h3 style="margin:0;">⚠️ كود مزيف أو غير مسجل!</h3>
                <p style="margin-top:15px; font-size:14px;">(اضغط هنا لمسح تذكرة أخرى)</p>`;
            }
        }

        function showError() {
            document.getElementById('loading').style.display = 'none';
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';
            resultDiv.className = 'result-box error';
            resultDiv.innerHTML = "<h3 style='margin:0;'>حدث خطأ في الاتصال بالإنترنت!</h3><p style='margin-top:15px; font-size:14px;'>(تأكد من صلاحيات رابط الشيت واضغط هنا للمحاولة)</p>";
        }
    </script>
</body>
</html>
