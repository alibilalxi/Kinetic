<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic Offline Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f2027; color: white; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 4px solid #1e3c72; background: #000; display: none; margin-bottom: 15px;}
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 18px; cursor: pointer; }
        .success { background: #28a745; color: white; }
        .error { background: #dc3545; color: white; }
        .sync-status { padding: 10px; color: #ffc107; font-weight: bold; margin-bottom: 10px; border: 1px dashed #ffc107; border-radius: 8px;}
        button { padding: 15px 25px; font-size: 20px; border-radius: 10px; cursor: pointer; background: #1e3c72; color: white; border: none; width: 100%; margin-top: 10px; transition: 0.3s;}
        table { width: 100%; background: white; color: black; border-radius: 8px; margin-top: 10px; border-collapse: collapse; }
        td, th { padding: 10px; border: 1px solid #ddd; text-align: right; }
        #pendingSync { color: #00f2fe; font-size: 14px; margin-top: 10px; display: none; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Offline Scan ⚡</h2>
        <div id="syncMsg" class="sync-status">🔄 جاري المزامنة...</div>
        <div id="pendingSync">⏳ يوجد عمليات بانتظار عودة الإنترنت...</div>
        
        <button id="startBtn" style="display:none;" onclick="startCamera()">Scan now</button>
        
        <div id="reader"></div>
        <div id="result" class="result-box" onclick="startCamera()"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwNLkRLIyDKf3LDZtL_3Nb5fUvJSPlX3R0JV_fbJRGeDswDXJO7gjHrqDau675cj1nBVQ/exec';
        let localData = JSON.parse(localStorage.getItem('offlineData')) || []; 
        let offlineQueue = JSON.parse(localStorage.getItem('offlineQueue')) || []; 
        let html5QrCode;

        // 1. مزامنة البيانات أول ما تفتح (لو فيه نت)
        window.onload = function() {
            updateSyncUI();
            fetchData();
            // محاولة إرسال العمليات المتأخرة لو النت رجع
            setInterval(syncOfflineQueue, 5000); 
        };

        function fetchData() {
            fetch(`${SCRIPT_URL}?action=fetchAll`)
            .then(res => res.json())
            .then(data => {
                localData = data;
                localStorage.setItem('offlineData', JSON.stringify(data));
                document.getElementById('syncMsg').innerHTML = "✅ البيانات محدثة (جاهز للأوفلاين)";
                document.getElementById('startBtn').style.display = "block";
            })
            .catch(() => {
                if(localData.length > 0) {
                    document.getElementById('syncMsg').innerHTML = "⚠️ تعمل بالنسخة المحفوظة (أوفلاين)";
                    document.getElementById('startBtn').style.display = "block";
                } else {
                    document.getElementById('syncMsg').innerHTML = "❌ لا يوجد إنترنت ولا نسخة محفوظة!";
                }
            });
        }

        function startCamera() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('startBtn').style.display = 'none';

            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 30, qrbox: 250 },
                (decodedText) => {
                    const student = localData.find(s => s.barcode === decodedText);
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        processResult(student, decodedText);
                    });
                }
            );
        }

        function processResult(student, barcode) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (!student) {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = "Wrong Qr code<br><span style='font-size:14px;'>(Scan again)</span>";
            } else if (student.status === "Paid") {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `❌ Scanned before!<br>Name: ${student.name}<br><span style='font-size:14px;'>(Scan again)</span>`;
            } else {
                // نجاح لحظي (حتى لو أوفلاين)
                resultDiv.className = 'result-box success';
                resultDiv.innerHTML = `✅ Scanned.<br>
                    <table>
                        <tr><th>الاسم</th><td>${student.name}</td></tr>
                        <tr><th>CD</th><td>${student.choice}</td></tr>
                    </table><br><span style='font-size:14px;'>(Scan again)</span>`;
                
                // تحديث الحالة في الذاكرة المحلية فوراً
                student.status = "Paid";
                localStorage.setItem('offlineData', JSON.stringify(localData));

                // إضافة العملية لطابور المزامنة
                addToOfflineQueue(barcode);
            }
        }

        function addToOfflineQueue(barcode) {
            offlineQueue.push(barcode);
            localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
            updateSyncUI();
            syncOfflineQueue();
        }

        function syncOfflineQueue() {
            if (offlineQueue.length === 0 || !navigator.onLine) return;

            const barcode = offlineQueue[0];
            fetch(`${SCRIPT_URL}?action=scan&barcode=${barcode}`)
            .then(res => res.json())
            .then(() => {
                offlineQueue.shift(); // مسح الكود اللي نجح إرساله
                localStorage.setItem('offlineQueue', JSON.stringify(offlineQueue));
                updateSyncUI();
                if(offlineQueue.length > 0) syncOfflineQueue(); // كمل الباقي
            })
            .catch(() => console.log("Still offline..."));
        }

        function updateSyncUI() {
            const pendingDiv = document.getElementById('pendingSync');
            if (offlineQueue.length > 0) {
                pendingDiv.style.display = 'block';
                pendingDiv.innerHTML = `⏳ بانتظار النت لمزامنة (${offlineQueue.length}) عملية...`;
            } else {
                pendingDiv.style.display = 'none';
            }
        }
    </script>
</body>
</html>
