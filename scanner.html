<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Kinetic Scanner</title>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Tajawal', sans-serif; background: #0f2027; color: white; margin: 0; padding: 15px; text-align: center; }
        .container { max-width: 500px; margin: 0 auto; }
        #reader { width: 100%; border-radius: 15px; overflow: hidden; border: 4px solid #1e3c72; background: #000; display: none; margin-bottom: 15px;}
        .result-box { margin-top: 20px; padding: 15px; border-radius: 10px; display: none; font-size: 18px; cursor: pointer; }
        .success { background: #28a745; color: white; }
        .error { background: #dc3545; color: white; }
        .sync-status { padding: 10px; color: #ffc107; font-weight: bold; margin-bottom: 10px;}
        button { padding: 15px 25px; font-size: 20px; border-radius: 10px; cursor: pointer; background: #1e3c72; color: white; border: none; width: 100%; margin-top: 10px; transition: 0.3s;}
        button:hover { background: #152b52; }
        table { width: 100%; background: white; color: black; border-radius: 8px; margin-top: 10px; border-collapse: collapse; }
        td, th { padding: 10px; border: 1px solid #ddd; text-align: right; }
    </style>
</head>
<body>
    <div class="container">
        <h2> Scan</h2>
        <div id="syncMsg" class="sync-status">Download...</div>
        
        <button id="startBtn" style="display:none;" onclick="startCamera()">Scan now</button>
        
        <div id="reader"></div>
        <div id="result" class="result-box" onclick="startCamera()"></div>
    </div>

    <script src="https://unpkg.com/html5-qrcode"></script>
    <script>
        // ✅ اللينك الجديد بتاعك
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbwBARKJ5-FyWEIWp_BHYt6OckgZARoCHW8VLdiTzfi-S2GWvGe6s1fx_PvKBV4FkFsW/exec';
        let localData = []; 
        let html5QrCode;

        window.onload = function() {
            fetch(`${SCRIPT_URL}?action=fetchAll`)
            .then(res => res.json())
            .then(data => {
                localData = data;
                document.getElementById('syncMsg').innerHTML = "ready to scan";
                document.getElementById('startBtn').style.display = "block";
            })
            .catch(err => {
                document.getElementById('syncMsg').innerHTML = "❌ خطأ في المزامنة! تأكد من الإنترنت.";
            });
        };

        function startCamera() {
            document.getElementById('result').style.display = 'none';
            document.getElementById('reader').style.display = 'block';
            document.getElementById('startBtn').style.display = 'none';

            if (!html5QrCode) html5QrCode = new Html5Qrcode("reader");

            html5QrCode.start(
                { facingMode: "environment" },
                { fps: 30, qrbox: 250 },
                (decodedText) => {
                    const student = localData.find(s => s.barcode === decodedText);
                    
                    html5QrCode.stop().then(() => {
                        document.getElementById('reader').style.display = 'none';
                        processResult(student, decodedText);
                    });
                }
            );
        }

        function processResult(student, barcode) {
            const resultDiv = document.getElementById('result');
            resultDiv.style.display = 'block';

            if (!student) {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = "Wrong Qr code<br><span style='font-size:14px;'>(Scan again)</span>";
            } else if (student.status === "Paid") {
                resultDiv.className = 'result-box error';
                resultDiv.innerHTML = `
                    <h3 style="margin:0 0 10px 0;">❌ Ticket already Scanned!</h3>
                    <table>
                        <tr><th>الاسم</th><td>${student.name}</td></tr>
                        <tr><th>CD</th><td>${student.choice}</td></tr>
                        <tr><th>السعر</th><td style="color:#d9534f; font-weight:bold;">EGP ${student.price}</td></tr>
                    </table><br><span style='font-size:14px;'>(Scan again)</span>`;
            } else {
                resultDiv.className = 'result-box success';
                resultDiv.innerHTML = `
                    <h3 style="margin:0 0 10px 0;">✅ Scanned.</h3>
                    <table>
                        <tr><th>الاسم</th><td>${student.name}</td></tr>
                        <tr><th>CD</th><td>${student.choice}</td></tr>
                        <tr><th>السعر</th><td style="color:#d9534f; font-weight:bold;">EGP ${student.price}</td></tr>
                    </table><br><span style='font-size:14px;'>(Scan again)</span>`;
                
                student.status = "Paid";
                fetch(`${SCRIPT_URL}?action=scan&barcode=${barcode}`);
            }
        }
    </script>
</body>
</html>
